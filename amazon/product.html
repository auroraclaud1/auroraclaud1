<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Producto — DealHunter Pro</title>
  <link rel="icon" type="image/png" href="logo/isotipo.png">
  <link rel="shortcut icon" href="logo/isotipo.png">
  <link rel="apple-touch-icon" href="logo/isotipo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ── Product page layout ─────────────────── */
    .pp-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 14px 20px 60px;
    }

    /* Breadcrumb */
    .pp-crumb {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }
    .pp-crumb a {
      color: #0066c0;
      text-decoration: none;
    }
    .pp-crumb a:hover { text-decoration: underline; }
    .pp-crumb span { color: var(--muted); }

    /* Main 3-column grid */
    .pp-main {
      display: grid;
      grid-template-columns: 430px 1fr 290px;
      gap: 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      align-items: start;
    }

    /* ── Gallery column ─────────────────────── */
    .pp-gallery {
      padding: 20px 20px 24px;
      border-right: 1px solid var(--border);
      position: sticky;
      top: 68px;
    }
    .pp-main-img {
      background: #f8f9fa;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 460px;
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
      cursor: zoom-in;
    }
    .pp-main-img img {
      max-width: 92%;
      max-height: 430px;
      object-fit: contain;
      transition: transform .35s ease;
    }
    .pp-main-img:hover img { transform: scale(1.07); }
    .pp-badge-img {
      position: absolute;
      top: 12px;
      left: 12px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 4px;
      z-index: 1;
    }
    .pp-thumbs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .pp-thumb {
      width: 66px;
      height: 66px;
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 5px;
      cursor: pointer;
      background: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .15s, box-shadow .15s;
    }
    .pp-thumb.active,
    .pp-thumb:hover { border-color: var(--navy); box-shadow: 0 0 0 1px var(--navy); }
    .pp-thumb img { max-width: 100%; max-height: 100%; object-fit: contain; }

    /* ── Info column ────────────────────────── */
    .pp-info {
      padding: 20px 22px;
      border-right: 1px solid var(--border);
    }
    .pp-brand-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .pp-brand-link {
      font-size: 12px;
      color: #0066c0;
      font-weight: 600;
      text-decoration: none;
    }
    .pp-brand-link:hover { text-decoration: underline; }
    .pp-condition {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid;
    }
    .pp-cond-new    { background: #d1fae5; color: #065f46; border-color: #6ee7b7; }
    .pp-cond-sale   { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
    .pp-cond-deal   { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
    .pp-cond-best   { background: #ffedd5; color: #9a3412; border-color: #fb923c; }
    .pp-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: 10px;
    }
    .pp-rating-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .pp-stars    { color: var(--gold); font-size: 15px; }
    .pp-rat-num  { font-size: 14px; color: #0066c0; font-weight: 600; }
    .pp-rat-rev  { font-size: 13px; color: #0066c0; }
    .pp-rat-rev:hover { text-decoration: underline; cursor: pointer; }
    .pp-sep { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
    .pp-asin { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
    .pp-asin strong { color: var(--text); }

    /* Options selector (variants) */
    .pp-opt-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 8px;
    }
    .pp-opts { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
    .pp-opt {
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 7px 12px;
      font-size: 12px;
      cursor: pointer;
      background: #fff;
      color: var(--text);
      transition: border-color .15s, background .15s;
      font-family: 'DM Sans', sans-serif;
      white-space: nowrap;
    }
    .pp-opt.active { border-color: #0066c0; background: #eff6ff; color: #0066c0; font-weight: 600; }
    .pp-opt:hover  { border-color: #0066c0; }
    .pp-opt-price  { display: block; font-weight: 700; font-size: 13px; margin-top: 1px; }

    /* Key specs bullet list */
    .pp-specs-title { font-size: 13px; font-weight: 700; margin-bottom: 7px; color: var(--text); }
    .pp-specs-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 12px;
    }
    .pp-specs-list li {
      display: flex;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }
    .pp-specs-list li::before { content: "•"; color: var(--navy); font-weight: 800; flex-shrink: 0; }

    /* Features */
    .pp-feat-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 12px;
    }
    .pp-feat-list li { display: flex; gap: 8px; font-size: 13px; color: var(--muted); }
    .pp-feat-list li::before { content: "✓"; color: var(--green); font-weight: 700; flex-shrink: 0; }

    .pp-desc { font-size: 13px; color: var(--muted); line-height: 1.75; }

    /* ── Buy box column ─────────────────────── */
    .pp-buy {
      padding: 18px;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .pp-price-main {
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 14px;
      background: #fff;
    }
    .pp-price-now {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 40px;
      font-weight: 800;
      color: var(--red);
      line-height: 1;
    }
    .pp-price-sup { font-size: 22px; vertical-align: super; line-height: 1; }
    .pp-price-was {
      font-size: 13px;
      color: var(--muted);
      text-decoration: line-through;
      margin-top: 2px;
    }
    .pp-save-tag {
      display: inline-block;
      background: var(--red);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 4px;
      margin-left: 6px;
    }
    .pp-savings-line { font-size: 13px; color: var(--green); font-weight: 600; margin-top: 5px; }

    /* Highlights */
    .pp-hl { display: flex; gap: 8px; font-size: 12.5px; align-items: flex-start; }
    .pp-hl-ico { flex-shrink: 0; font-size: 14px; margin-top: 1px; }
    .pp-hl strong { display: block; font-size: 12px; font-weight: 600; }
    .pp-hl span   { color: var(--muted); font-size: 12px; }

    /* Watchers */
    .pp-watchers {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 7px;
      padding: 7px 10px;
    }
    .pp-watchers strong { color: var(--red); }

    /* Buttons */
    .pp-btn-buy {
      display: block;
      width: 100%;
      padding: 13px;
      background: #FFD814;
      color: #111;
      text-align: center;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      border: 2px solid #FFA41C;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background .15s;
      text-decoration: none;
    }
    .pp-btn-buy:hover { background: #f7c600; }
    .pp-btn-amz {
      display: block;
      width: 100%;
      padding: 11px;
      background: #fff;
      color: var(--navy);
      text-align: center;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      border: 2px solid var(--navy);
      text-decoration: none;
      transition: all .15s;
    }
    .pp-btn-amz:hover { background: var(--navy); color: #fff; }

    /* Shipping / seller */
    .pp-ship {
      font-size: 12.5px;
      color: var(--green);
      font-weight: 600;
    }
    .pp-seller {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
    }
    .pp-seller strong { color: var(--text); }
    .pp-trust-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
    }
    .pp-trust-item { display: flex; align-items: center; gap: 6px; }

    /* ── Similar products ───────────────────── */
    .pp-related { margin-top: 22px; }
    .pp-related-hdr {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text);
    }
    .pp-related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 10px;
    }
    .pp-rel-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 11px;
      cursor: pointer;
      transition: box-shadow .2s, border-color .2s;
      display: flex;
      flex-direction: column;
    }
    .pp-rel-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,.1); border-color: #93c5fd; }
    .pp-rel-img {
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }
    .pp-rel-img img { max-width: 100%; max-height: 82px; object-fit: contain; }
    .pp-rel-name {
      font-size: 12px;
      font-weight: 500;
      line-height: 1.35;
      color: var(--text);
      margin-bottom: 5px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color .15s;
    }
    .pp-rel-card:hover .pp-rel-name { color: #0066c0; }
    .pp-rel-price { font-size: 14px; font-weight: 700; color: var(--red); }
    .pp-rel-disc { font-size: 11px; color: var(--muted); text-decoration: line-through; margin-left: 5px; }

    /* ── Reviews section ────────────────────── */
    .pp-reviews {
      margin-top: 22px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px;
    }
    .pp-rev-hdr {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    /* ── Responsive ─────────────────────────── */
    @media (max-width: 1100px) {
      .pp-main { grid-template-columns: 380px 1fr 270px; }
      .pp-main-img { height: 400px; }
      .pp-main-img img { max-height: 370px; }
    }
    @media (max-width: 960px) {
      .pp-main { grid-template-columns: 320px 1fr; }
      .pp-main-img { height: 340px; }
      .pp-main-img img { max-height: 310px; }
      .pp-gallery { position: static; }
      .pp-buy  { grid-column: 1 / -1; border-top: 1px solid var(--border); border-right: none; flex-direction: row; flex-wrap: wrap; gap: 14px; }
      .pp-price-main { flex: 1 1 200px; }
    }
    @media (max-width: 640px) {
      .pp-main { grid-template-columns: 1fr; }
      .pp-gallery { border-right: none; border-bottom: 1px solid var(--border); }
      .pp-main-img { height: 280px; }
      .pp-main-img img { max-height: 250px; }
      .pp-info    { border-right: none; border-bottom: 1px solid var(--border); }
      .pp-buy     { flex-direction: column; }
      .pp-related-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<header class="hdr">
  <div class="hdr-top">
    <a class="logo" href="index.html"><img src="logo/logo.png" alt="DealHunter Pro" class="logo-img"></a>

    <div class="hdr-addr">
      <svg class="hdr-addr-pin" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
      </svg>
      <div>
        <div class="hdr-addr-top">Entregar a</div>
        <div class="hdr-addr-main" id="hdrAddrCountry">Detectando…</div>
      </div>
    </div>

    <div class="search-wrap">
      <input type="text" placeholder="Buscar productos en oferta..." onkeydown="if(event.key==='Enter'){window.location.href='index.html?q='+encodeURIComponent(this.value)}">
      <button onclick="window.location.href='index.html'">🔍</button>
    </div>

    <div class="hdr-right">

      <button class="hdr-icon-btn" title="Notificaciones">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </button>

      <div class="hdr-country-wrap" id="countryWrap">
        <button class="hdr-icon-btn hdr-country-btn" id="countryBtn" onclick="toggleCountry(event)" title="Seleccionar país">
          <img id="countryFlag" src="https://flagcdn.com/w40/us.png" alt="País" class="hdr-flag">
          <span id="countryCode" class="hdr-country-code">US</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.55)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="hdr-country-drop" id="countryDrop"></div>
      </div>

      <button class="hdr-user-block" onclick="window.location.href='index.html'">
        <div class="hdr-block-top">Bienvenido</div>
        <div class="hdr-block-main">Iniciar sesión / Registro</div>
      </button>

      <button class="hdr-user-block" onclick="window.location.href='index.html'">
        <div class="hdr-block-top">Devoluciones</div>
        <div class="hdr-block-main">y Pedidos</div>
      </button>

      <div class="hdr-cart-btn" onclick="openCart()" title="Carrito" style="cursor:pointer">
        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1" fill="currentColor"/>
          <circle cx="20" cy="21" r="1" fill="currentColor"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span class="hdr-cart-badge">0</span>
      </div>

    </div>
  </div>
</header>

<div class="pp-wrap" id="ppWrap">
  <div style="padding:60px;text-align:center;color:var(--muted)">Cargando producto…</div>
</div>

<footer>
  <div class="foot-logo"><img src="logo/logo.png" alt="DealHunter Pro" class="logo-img"></div>
  <p>Como Asociado de Amazon, obtenemos ingresos por las compras que califican.<br>
  Los precios mostrados pueden variar.</p>
  <p style="margin-top:10px;font-size:11px">© 2025 DealHunter Pro — Todos los enlaces redirigen al producto real en Amazon.com</p>
</footer>

<!-- Cart drawer -->
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-overlay" onclick="closeCart()"></div>
  <div class="cart-panel">
    <div class="cart-panel-hdr">
      <h3>Tu carrito 🛒</h3>
      <button class="cart-close-btn" onclick="closeCart()">✕</button>
    </div>
    <div class="cart-items-list" id="cartItems"></div>
    <div class="cart-footer" id="cartFooter"></div>
  </div>
</div>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/header.js"></script>
<script>
const params  = new URLSearchParams(location.search);
const id      = parseInt(params.get('id'));
const p       = PRODUCTOS.find(x => x.id === id);
const wrap    = document.getElementById('ppWrap');

function pct(b, n)  { return Math.round((b - n) / b * 100); }
function fmt(n)     { return '$' + n.toFixed(2); }
function starsStr(r) {
  const f = Math.floor(r), h = r % 1 >= 0.5 ? 1 : 0, e = 5 - f - h;
  return '★'.repeat(f) + (h ? '½' : '') + '☆'.repeat(e);
}
function badgeCls(b) {
  return b === 'Oferta del día' ? 'b-deal'
       : b === 'Más vendido'   ? 'b-best'
       : b === 'Precio mínimo histórico' ? 'b-low'
       : b === 'Flash sale'    ? 'b-flash' : '';
}
function condCls(b) {
  return b === 'Oferta del día' ? 'pp-cond-deal'
       : b === 'Más vendido'   ? 'pp-cond-best'
       : b === 'Flash sale'    ? 'pp-cond-deal'
       : b === 'Precio mínimo histórico' ? 'pp-cond-sale'
       : 'pp-cond-new';
}

if (!p) {
  wrap.innerHTML = '<div style="padding:60px;text-align:center"><h2>Producto no encontrado</h2>' +
    '<p style="margin-top:12px"><a href="index.html" style="color:#0066c0">← Volver a ofertas</a></p></div>';
} else {
  document.title = p.nombre.substring(0, 60) + ' — DealHunter Pro';

  const disc  = pct(p.precioAntes, p.precioAhora);
  const saved = (p.precioAntes - p.precioAhora).toFixed(2);
  const url   = 'https://www.amazon.com/dp/' + p.asin + '?tag=' + TAG;
  const bc    = badgeCls(p.badge);
  const cc    = condCls(p.badge);
  const w     = WATCHERS[p.id];

  // Pick 3 similar products to show as "options"
  const opts  = PRODUCTOS.filter(x => x.categoria === p.categoria && x.id !== p.id).slice(0, 3);

  // Related products (broader, different from opts)
  const related = PRODUCTOS.filter(x => x.categoria === p.categoria && x.id !== p.id).slice(0, 8);

  wrap.innerHTML =
    /* Breadcrumb */
    '<nav class="pp-crumb">' +
      '<a href="index.html">Inicio</a><span>›</span>' +
      '<a href="index.html?cat=' + encodeURIComponent(p.categoria) + '">' + p.categoria + '</a><span>›</span>' +
      '<span style="color:var(--text)">' + p.nombre.substring(0, 55) + '…</span>' +
    '</nav>' +

    /* Main 3-column panel */
    '<div class="pp-main">' +

      /* Column 1 — Gallery */
      '<div class="pp-gallery">' +
        '<div class="pp-main-img">' +
          (p.badge ? '<span class="pp-badge-img ' + bc + '">' + p.badge + '</span>' : '') +
          '<img id="ppMainImg" src="' + p.imagen + '" onerror="imgErr(this)" alt="' + p.nombre + '">' +
        '</div>' +
        '<div class="pp-thumbs" id="ppThumbs"></div>' +
      '</div>' +

      /* Column 2 — Info */
      '<div class="pp-info">' +
        '<div class="pp-brand-row">' +
          '<a class="pp-brand-link" href="index.html">Ver todos los productos de esta categoría</a>' +
          (p.badge ? '<span class="pp-condition ' + cc + '">' + p.badge + '</span>' : '') +
        '</div>' +
        '<h1 class="pp-title">' + p.nombre + '</h1>' +
        '<div class="pp-rating-row">' +
          '<span class="pp-stars">' + starsStr(p.rating) + '</span>' +
          '<span class="pp-rat-num">' + p.rating + '</span>' +
          '<span class="pp-rat-rev">(' + p.reviews.toLocaleString() + ' valoraciones)</span>' +
        '</div>' +
        '<div class="pp-asin">ASIN: <strong>' + p.asin + '</strong> &nbsp;·&nbsp; Vendido en <strong>Amazon.com</strong></div>' +

        (opts.length > 0 ?
          '<div class="pp-opt-label">Opciones similares</div>' +
          '<div class="pp-opts">' +
            '<div class="pp-opt active">' + p.nombre.split(' ').slice(0,4).join(' ') +
              '<span class="pp-opt-price">' + fmt(p.precioAhora) + '</span>' +
            '</div>' +
            opts.slice(0,2).map(s =>
              '<div class="pp-opt" onclick="window.location.href=\'product.html?id=' + s.id + '\'">' +
                s.nombre.split(' ').slice(0,4).join(' ') +
                '<span class="pp-opt-price">' + fmt(s.precioAhora) + '</span>' +
              '</div>'
            ).join('') +
          '</div>'
        : '') +

        '<hr class="pp-sep">' +
        '<div class="pp-specs-title">Especificaciones principales</div>' +
        '<ul class="pp-specs-list">' +
          '<li>Categoría: ' + p.categoria + '</li>' +
          '<li>Rating: ' + p.rating + ' / 5 — ' + p.reviews.toLocaleString() + ' reseñas verificadas</li>' +
          '<li>ASIN Amazon: ' + p.asin + '</li>' +
        '</ul>' +
        '<div class="pp-specs-title">Características del producto</div>' +
        '<ul class="pp-feat-list">' +
          (p.features || []).map(f => '<li>' + f + '</li>').join('') +
        '</ul>' +
        '<hr class="pp-sep">' +
        '<p class="pp-desc">' + p.descripcion + '</p>' +
      '</div>' +

      /* Column 3 — Buy box */
      '<div class="pp-buy" id="ppBuyBox">' +
        '<div class="pp-price-main">' +
          '<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Precio oferta</div>' +
          '<div class="pp-price-now">' + fmt(p.precioAhora) + '</div>' +
          '<div class="pp-price-was">Precio original: ' + fmt(p.precioAntes) +
            '<span class="pp-save-tag">-' + disc + '%</span>' +
          '</div>' +
          '<div class="pp-savings-line">💰 Ahorras $' + saved + '</div>' +
        '</div>' +

        '<div class="pp-watchers">🔥 <strong>' + w + '</strong>&nbsp;personas viendo este producto ahora</div>' +

        '<div class="pp-hl">' +
          '<span class="pp-hl-ico">🚚</span>' +
          '<div><strong>Envío gratis Prime</strong><span>Entrega en 1-2 días</span></div>' +
        '</div>' +
        '<div class="pp-hl">' +
          '<span class="pp-hl-ico">↩️</span>' +
          '<div><strong>Devolución gratuita</strong><span>30 días sin preguntas</span></div>' +
        '</div>' +
        '<div class="pp-hl">' +
          '<span class="pp-hl-ico">📦</span>' +
          '<div><strong style="color:var(--green)">En stock</strong><span>Oferta por tiempo limitado</span></div>' +
        '</div>' +

        '<hr style="border:none;border-top:1px solid var(--border);margin:2px 0">' +

        '<button class="pp-btn-cart" onclick="cartAddById(' + p.id + ')">🛒 Agregar al carrito</button>' +
        '<button class="pp-btn-buy" onclick="cartAddById(' + p.id + ');window.location.href=\'checkout.html\'">⚡ Comprar ahora</button>' +
        '<a href="' + url + '" class="pp-btn-amz" target="_blank" rel="nofollow noopener">Ver en Amazon →</a>' +

        '<hr style="border:none;border-top:1px solid var(--border);margin:2px 0">' +

        '<div class="pp-seller">' +
          'Vendido por <strong>Amazon.com</strong><br>' +
          'Enviado por <strong>Amazon Prime</strong>' +
        '</div>' +
        '<div class="pp-trust-list">' +
          '<div class="pp-trust-item"><span>🔒</span><span>Transacción 100% segura</span></div>' +
          '<div class="pp-trust-item"><span>✅</span><span>Producto verificado · ASIN real</span></div>' +
          '<div class="pp-trust-item"><span>🛡️</span><span>Garantía de compra Amazon</span></div>' +
        '</div>' +
      '</div>' +

    '</div>' + /* end .pp-main */

    /* Related products */
    (related.length > 0 ?
      '<div class="pp-related">' +
        '<div class="pp-related-hdr">También te puede interesar</div>' +
        '<div class="pp-related-grid">' +
          related.map(s =>
            '<div class="pp-rel-card" onclick="window.location.href=\'product.html?id=' + s.id + '\'">' +
              '<div class="pp-rel-img"><img src="' + s.imagen + '" onerror="imgErr(this)" alt="' + s.nombre + '" loading="lazy"></div>' +
              '<div class="pp-rel-name">' + s.nombre + '</div>' +
              '<div>' +
                '<span class="pp-rel-price">' + fmt(s.precioAhora) + '</span>' +
                '<span class="pp-rel-disc">' + fmt(s.precioAntes) + '</span>' +
              '</div>' +
            '</div>'
          ).join('') +
        '</div>' +
      '</div>'
    : '') +

    /* Reviews */
    '<div class="pp-reviews">' + buildReviews(p) + '</div>';

  // Thumbnails
  const mainImg  = document.getElementById('ppMainImg');
  const thumbCnt = document.getElementById('ppThumbs');
  [p.imagen, p.imagen, p.imagen].forEach((src, i) => {
    const t = document.createElement('div');
    t.className = 'pp-thumb' + (i === 0 ? ' active' : '');
    t.innerHTML = '<img src="' + src + '" onerror="imgErr(this)" alt="">';
    t.onclick = () => {
      document.querySelectorAll('.pp-thumb').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      mainImg.src = src;
    };
    thumbCnt.appendChild(t);
  });
}

function buildReviews(p) {
  function starsStr(r) {
    const f = Math.floor(r), h = r % 1 >= 0.5 ? 1 : 0, e = 5 - f - h;
    return '★'.repeat(f) + (h ? '½' : '') + '☆'.repeat(e);
  }
  const pcts = [
    Math.round(45 + Math.random() * 25),
    Math.round(20 + Math.random() * 15),
    Math.round(5  + Math.random() * 8),
    Math.round(2  + Math.random() * 4),
    Math.round(1  + Math.random() * 3)
  ];
  const revs = [
    { a: 'María G.',  d: '12 mar 2025', t: '¡Excelente producto!',              b: 'Llegó perfectamente. El enlace me llevó directo a Amazon, compré con total confianza. Funciona exactamente como se describe.', r: 5 },
    { a: 'Carlos M.', d: '3 abr 2025',  t: 'Precio imbatible, lo recomiendo',   b: 'Encontré esta oferta y al hacer clic me llevó al producto real en Amazon. Llegó al día siguiente con Prime. Increíble relación calidad-precio.', r: 5 },
    { a: 'Ana L.',    d: '28 feb 2025', t: 'Muy satisfecha con la compra',      b: 'Dudé al principio pero el producto es exactamente como se describe. Amazon entregó en 2 días y la devolución fue facilísima.', r: 4 },
    { a: 'Pedro R.',  d: '15 ene 2025', t: 'Descuento real, sin trucos',        b: 'El precio que vi aquí era exactamente el mismo que en Amazon al hacer clic. Muy transparente y honesto. Totalmente recomendable.', r: 5 },
  ];
  return '<div class="pp-rev-hdr">Reseñas de clientes en Amazon</div>' +
    '<div class="rev-summary">' +
      '<div class="rev-big-num">' + p.rating.toFixed(1) + '</div>' +
      '<div>' +
        '<div class="stars" style="font-size:20px">' + starsStr(p.rating) + '</div>' +
        '<div style="font-size:12px;color:var(--muted);margin-top:3px">' + p.reviews.toLocaleString() + ' valoraciones globales</div>' +
      '</div>' +
      '<div class="rev-bars">' + ['5 ★','4 ★','3 ★','2 ★','1 ★'].map((l, i) =>
        '<div class="rev-bar-row">' + l +
          '<div class="rev-bar-track"><div class="rev-bar-fill" style="width:' + pcts[i] + '%"></div></div>' +
          pcts[i] + '%</div>'
      ).join('') + '</div>' +
    '</div>' +
    '<div class="rev-cards">' + revs.map(r =>
      '<div class="rev-card">' +
        '<div class="rev-head"><span class="rev-author">' + r.a + '</span><span class="rev-date">' + r.d + '</span></div>' +
        '<div class="rev-stars">' + '★'.repeat(r.r) + '☆'.repeat(5 - r.r) + '</div>' +
        '<div class="rev-title">' + r.t + '</div>' +
        '<div class="rev-body">' + r.b + '</div>' +
        '<div class="rev-verified">✅ Compra verificada en Amazon</div>' +
      '</div>'
    ).join('') + '</div>';
}

// ── Inline payment ──────────────────────────────────────────────
let _ppOrigHTML = '';

function showPPPay() {
  _ppOrigHTML = wrap.innerHTML;

  wrap.innerHTML =
    '<div class="pp-co-wrap">' +
      '<button class="pp-co-back" onclick="hidePPPay()">← Volver al producto</button>' +
      '<div class="pp-co-grid">' +

        /* LEFT — Order summary */
        '<div class="pp-co-left">' +
          '<div class="pp-co-stitle">Resumen del pedido</div>' +
          '<div class="pp-co-prod">' +
            '<img src="' + p.imagen + '" onerror="imgErr(this)" alt="' + p.nombre + '">' +
            '<div>' +
              '<div class="pp-co-prod-name">' + p.nombre + '</div>' +
              '<div class="pp-co-prod-cat">' + p.categoria + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="pp-co-totals">' +
            '<div class="pp-co-trow">' +
              '<span>Precio original</span>' +
              '<span class="strike">' + fmt(p.precioAntes) + '</span>' +
            '</div>' +
            '<div class="pp-co-trow saving">' +
              '<span>Descuento (-' + disc + '%)</span>' +
              '<span>-$' + saved + '</span>' +
            '</div>' +
            '<div class="pp-co-trow">' +
              '<span>Envío Prime</span>' +
              '<span class="free">GRATIS</span>' +
            '</div>' +
            '<div class="pp-co-tdiv"></div>' +
            '<div class="pp-co-trow total">' +
              '<span>Total</span>' +
              '<span>' + fmt(p.precioAhora) + '</span>' +
            '</div>' +
          '</div>' +
          '<div class="pp-co-trust">' +
            '<div>🔒 Transacción cifrada SSL/TLS</div>' +
            '<div>✅ Producto verificado · ASIN real</div>' +
            '<div>🛡️ Garantía de compra Amazon</div>' +
            '<div>🚚 Envío gratis Prime — 1-2 días</div>' +
          '</div>' +
        '</div>' +

        /* RIGHT — Payment form */
        '<div class="pp-co-right">' +
          '<div class="pp-co-fhdr">' +
            '<span class="pp-co-ftitle">🔒 Pago seguro</span>' +
            '<div class="pp-co-logos">' +
              '<span class="pp-co-logo visa">VISA</span>' +
              '<span class="pp-co-logo mc">MC</span>' +
              '<span class="pp-co-logo amex">AMEX</span>' +
            '</div>' +
          '</div>' +

          '<div id="ppPayForm">' +
            '<div class="pp-co-field">' +
              '<label class="pp-co-lbl">Nombre del titular</label>' +
              '<input class="pp-co-inp" type="text" id="ppPayName" placeholder="Juan García" autocomplete="cc-name">' +
            '</div>' +
            '<div class="pp-co-field">' +
              '<label class="pp-co-lbl">Número de tarjeta</label>' +
              '<div class="pp-co-cwrap">' +
                '<input class="pp-co-inp" type="text" id="ppPayCard" placeholder="1234  5678  9012  3456" maxlength="22" autocomplete="cc-number" inputmode="numeric" style="padding-right:46px">' +
                '<span class="pp-co-cicon" id="ppPayBrand">💳</span>' +
              '</div>' +
            '</div>' +
            '<div class="pp-co-2col">' +
              '<div class="pp-co-field">' +
                '<label class="pp-co-lbl">Vencimiento</label>' +
                '<input class="pp-co-inp" type="text" id="ppPayExp" placeholder="MM/AA" maxlength="5" inputmode="numeric">' +
              '</div>' +
              '<div class="pp-co-field">' +
                '<label class="pp-co-lbl">CVV <span class="pp-co-hint" title="3 dígitos al dorso (AMEX: 4 al frente)">?</span></label>' +
                '<input class="pp-co-inp" type="text" id="ppPayCvv" placeholder="•••" maxlength="4" inputmode="numeric">' +
              '</div>' +
            '</div>' +
            '<div class="pp-co-err" id="ppPayErr" style="display:none"></div>' +
            '<button class="pp-co-btn" onclick="ppProcessPayment()">Pagar ' + fmt(p.precioAhora) + ' →</button>' +
            '<div class="pp-co-ssl">🔒 Tus datos están protegidos con cifrado de 256 bits</div>' +
          '</div>' +

          '<div id="ppPayProcess" style="display:none;flex-direction:column;align-items:center;padding:48px 0;gap:16px">' +
            '<div class="pp-co-spin"></div>' +
            '<p style="color:var(--muted);font-size:14px;font-weight:500">Procesando pago…</p>' +
          '</div>' +

          '<div id="ppPaySuccess" style="display:none;flex-direction:column;align-items:center;text-align:center;padding:32px 0;gap:10px">' +
            '<div class="pp-co-icon-circle" style="background:#d1fae5">✅</div>' +
            '<div style="font-weight:700;font-size:19px;color:var(--green)">¡Pago aprobado!</div>' +
            '<div id="ppPayOrder" style="font-size:13px;color:var(--muted);font-family:monospace"></div>' +
            '<p style="font-size:13px;color:var(--muted);max-width:280px">Recibirás la confirmación por correo. Tu pedido llegará en 1–2 días hábiles.</p>' +
            '<a href="index.html" style="margin-top:8px;padding:10px 24px;background:#FFD814;border:1px solid #FCD200;border-radius:8px;font-size:14px;font-weight:700;color:#0F1111;text-decoration:none">← Seguir comprando</a>' +
          '</div>' +

          '<div id="ppPayDeclined" style="display:none;flex-direction:column;align-items:center;text-align:center;padding:32px 0;gap:10px">' +
            '<div class="pp-co-icon-circle" style="background:#fee2e2">❌</div>' +
            '<div style="font-weight:700;font-size:19px;color:var(--red)">Pago rechazado</div>' +
            '<p style="font-size:13px;color:var(--muted);max-width:280px">El banco rechazó la transacción. Verifica los datos o usa otra tarjeta.</p>' +
            '<button onclick="ppRetryPayment()" style="margin-top:8px;padding:11px 24px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">Usar otra tarjeta</button>' +
          '</div>' +
        '</div>' +

      '</div>' +
    '</div>';

  // Card auto-format + logo highlight
  document.getElementById('ppPayCard').addEventListener('input', function() {
    let v = this.value.replace(/\D/g,'').substring(0,16);
    this.value = v.match(/.{1,4}/g)?.join('  ') || v;
    const b = document.getElementById('ppPayBrand');
    document.querySelectorAll('.pp-co-logo').forEach(l => l.classList.remove('on'));
    if (v.startsWith('4'))                              { b.textContent='💙'; document.querySelector('.pp-co-logo.visa')?.classList.add('on'); }
    else if (/^5[1-5]|^2[2-7]/.test(v))                { b.textContent='🟠'; document.querySelector('.pp-co-logo.mc')?.classList.add('on'); }
    else if (/^3[47]/.test(v))                          { b.textContent='🟢'; document.querySelector('.pp-co-logo.amex')?.classList.add('on'); }
    else                                                { b.textContent='💳'; }
  });
  // Expiry auto-format
  document.getElementById('ppPayExp').addEventListener('input', function() {
    let v = this.value.replace(/\D/g,'');
    if (v.length >= 3) v = v.slice(0,2) + '/' + v.slice(2,4);
    else if (v.length === 2 && !this.value.includes('/')) v += '/';
    this.value = v;
  });
  // Enter key
  ['ppPayName','ppPayCard','ppPayExp','ppPayCvv'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('keydown', e => { if (e.key === 'Enter') ppProcessPayment(); });
  });
  setTimeout(() => document.getElementById('ppPayName').focus(), 60);
}

function hidePPPay() {
  wrap.innerHTML = _ppOrigHTML;
  // Re-attach thumbnail click handlers lost on innerHTML restore
  const mainImg = document.getElementById('ppMainImg');
  document.querySelectorAll('.pp-thumb').forEach(t => {
    const src = t.querySelector('img').src;
    t.onclick = () => {
      document.querySelectorAll('.pp-thumb').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      mainImg.src = src;
    };
  });
}

function ppShowErr(id, msg) {
  const e = document.getElementById('ppPayErr');
  e.textContent = msg; e.style.display = '';
  const inp = document.getElementById(id);
  if (inp) { inp.focus(); inp.style.borderColor = 'var(--red)'; }
}

function ppLuhn(n) {
  let s = 0, a = false;
  for (let i = n.length-1; i >= 0; i--) {
    let d = parseInt(n[i],10);
    if (a) { d *= 2; if (d > 9) d -= 9; }
    s += d; a = !a;
  }
  return s % 10 === 0;
}

function ppValExp(exp) {
  if (!/^\d{2}\/\d{2}$/.test(exp)) return 'Formato: MM/AA';
  const [mm, yy] = exp.split('/').map(Number);
  if (mm < 1 || mm > 12) return 'Mes inválido (01–12)';
  const now = new Date(), cy = now.getFullYear() % 100, cm = now.getMonth() + 1;
  if (yy > cy + 10) return 'Año inválido';
  if (yy < cy || (yy === cy && mm < cm)) return 'Tarjeta vencida';
  return null;
}

function ppProcessPayment() {
  const name = document.getElementById('ppPayName').value.trim();
  const card = document.getElementById('ppPayCard').value.replace(/\s/g,'');
  const exp  = document.getElementById('ppPayExp').value.trim();
  const cvv  = document.getElementById('ppPayCvv').value.trim();
  ['ppPayName','ppPayCard','ppPayExp','ppPayCvv'].forEach(id => {
    const el = document.getElementById(id); if (el) el.style.borderColor = '';
  });
  document.getElementById('ppPayErr').style.display = 'none';
  document.getElementById('ppPayErr').textContent = '';
  if (!name)                                   return ppShowErr('ppPayName','Ingresa el nombre del titular');
  if (card.length < 13 || !/^\d+$/.test(card)) return ppShowErr('ppPayCard','Número de tarjeta inválido');
  if (!ppLuhn(card))                           return ppShowErr('ppPayCard','Tarjeta incorrecta — verifica los dígitos');
  const expErr = ppValExp(exp);
  if (expErr)                                  return ppShowErr('ppPayExp', expErr);
  if (cvv.length < 3)                          return ppShowErr('ppPayCvv','CVV inválido');

  document.getElementById('ppPayForm').style.display    = 'none';
  document.getElementById('ppPayProcess').style.display = 'flex';
  setTimeout(() => {
    document.getElementById('ppPayProcess').style.display = 'none';
    if (Math.random() < 0.75) {
      document.getElementById('ppPaySuccess').style.display = 'flex';
      document.getElementById('ppPayOrder').textContent = 'Orden #DH-' + Math.random().toString(36).substr(2,8).toUpperCase();
    } else {
      document.getElementById('ppPayDeclined').style.display = 'flex';
    }
  }, 2800);
}

function ppRetryPayment() {
  document.getElementById('ppPayDeclined').style.display = 'none';
  document.querySelectorAll('.pp-co-logo').forEach(l => l.classList.remove('on'));
  ['ppPayCard','ppPayExp','ppPayCvv'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.value = ''; el.style.borderColor = ''; }
  });
  const brand = document.getElementById('ppPayBrand');
  if (brand) brand.textContent = '💳';
  document.getElementById('ppPayErr').style.display = 'none';
  document.getElementById('ppPayForm').style.display = '';
  setTimeout(() => document.getElementById('ppPayCard').focus(), 60);
}
</script>
