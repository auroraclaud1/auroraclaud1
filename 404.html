<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página no encontrada — Aurora Claud</title>
<link rel="icon" type="image/png" href="/logo/isotipo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#0c0c0e;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;overflow:hidden}
.bg-glow{position:fixed;inset:0;z-index:0;pointer-events:none}
.glow-1{position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(108,71,255,0.18) 0%,transparent 70%);top:-100px;left:-100px;border-radius:50%}
.glow-2{position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(0,200,180,0.12) 0%,transparent 70%);bottom:-80px;right:-80px;border-radius:50%}
.content{position:relative;z-index:1;max-width:520px}
.logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:48px}
.logo img{width:36px;height:36px;object-fit:contain}
.logo-text{font-size:18px;font-weight:800;letter-spacing:-0.02em;color:#fff}
.code{font-size:clamp(100px,20vw,160px);font-weight:800;line-height:1;letter-spacing:-0.04em;background:linear-gradient(135deg,#6c47ff,#00c8b4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
h1{font-size:clamp(20px,4vw,26px);font-weight:700;color:#fff;margin-bottom:14px;letter-spacing:-0.02em}
p{font-size:15px;color:rgba(255,255,255,0.45);font-weight:300;line-height:1.7;margin-bottom:40px}
.actions{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
.btn-home{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#6c47ff,#00c8b4);color:#fff;font-size:14px;font-weight:700;padding:14px 28px;border-radius:100px;text-decoration:none;transition:opacity .2s}
.btn-home:hover{opacity:.85}
.btn-back{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.7);font-size:14px;font-weight:500;padding:14px 28px;border-radius:100px;text-decoration:none;border:1px solid rgba(255,255,255,0.1);transition:background .2s}
.btn-back:hover{background:rgba(255,255,255,0.12)}
</style>
</head>
<body>
<div class="bg-glow"><div class="glow-1"></div><div class="glow-2"></div></div>
<div class="content">
  <div class="logo">
    <img src="/logo/isotipo.png" alt="Aurora Claud">
    <span class="logo-text">Aurora Claud</span>
  </div>
  <div class="code">404</div>
  <h1>Página no encontrada</h1>
  <p>La página que buscas no existe o fue movida.<br>Vuelve al inicio y continúa explorando.</p>
  <div class="actions">
    <a href="/" class="btn-home">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Ir al inicio
    </a>
    <a href="javascript:history.back()" class="btn-back">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Volver atrás
    </a>
  </div>
</div>
</body>
</html>
